<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机回忆 - 毕业纪念相册</title>
  <style>
:root{--bg:#fff7ec;--card:rgba(255,248,238,.86);--solid:#fff8ee;--gold:#d89435;--gold-dark:#8b551f;--orange:#f58b42;--brown:#3a2416;--muted:#8b735c;--line:rgba(170,115,55,.18);--shadow:0 18px 45px rgba(95,62,26,.16)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;color:var(--brown);background:radial-gradient(circle at top left,rgba(255,207,132,.35),transparent 30%),linear-gradient(180deg,#fff4e4 0%,#fffaf3 42%,#fff6ea 100%);min-height:100vh}a{color:inherit;text-decoration:none}.topbar{position:sticky;top:0;z-index:20;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 42px;background:rgba(255,248,239,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(160,105,45,.12)}.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:21px;color:var(--gold-dark)}.brand-icon{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,#f4b259,#8c4a19);color:#fff;box-shadow:0 10px 20px rgba(155,90,28,.22)}.back{padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid var(--line);font-weight:800;color:#7b552c}.page-hero{width:min(1180px,calc(100% - 36px));margin:36px auto 22px;padding:42px;border-radius:34px;position:relative;overflow:hidden;min-height:250px;background:linear-gradient(135deg,rgba(75,42,18,.62),rgba(225,133,54,.28)),url("photos_v2/large/DSC5052_large.webp") center/cover no-repeat;box-shadow:var(--shadow)}.page-hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(255,218,150,.5),transparent 30%),linear-gradient(180deg,transparent,rgba(255,247,235,.2))}.page-hero>*{position:relative;z-index:1}.tag{display:inline-flex;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.72);color:#7d4c1f;font-weight:800;font-size:13px}.page-hero h1{font-family:"STKaiti","KaiTi","Microsoft YaHei",serif;font-size:clamp(44px,7vw,84px);line-height:1;margin:22px 0 10px;color:#fff5df;text-shadow:0 16px 34px rgba(60,30,10,.35)}.page-hero p{max-width:680px;margin:0;color:#fff8eb;font-size:17px;line-height:1.8}.shell{width:min(1180px,calc(100% - 36px));margin:0 auto 80px}.panel{padding:26px;border-radius:28px;background:var(--card);border:1px solid rgba(255,255,255,.72);box-shadow:var(--shadow);backdrop-filter:blur(12px)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.btn{height:46px;padding:0 20px;border:none;border-radius:999px;cursor:pointer;font:inherit;font-weight:800;background:linear-gradient(135deg,#ffad57,#f26f42);color:#fff;box-shadow:0 12px 24px rgba(220,105,45,.22)}.btn.secondary{background:rgba(255,255,255,.72);color:#7b552c;border:1px solid var(--line);box-shadow:none}.input,textarea,select{width:100%;border:1px solid rgba(180,120,60,.18);background:rgba(255,255,255,.78);border-radius:18px;padding:13px 15px;outline:none;font:inherit;color:var(--brown)}textarea{min-height:120px;resize:vertical}.form-row{display:grid;gap:14px;margin:14px 0}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.mini-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.62);border:1px solid var(--line)}.mini-card h3{margin:0 0 8px}.mini-card p{margin:0;color:var(--muted);line-height:1.7}.preview-img{width:100%;max-height:420px;object-fit:cover;border-radius:22px;box-shadow:0 16px 34px rgba(80,52,24,.12);background:#eee}.note{color:var(--muted);font-size:14px;line-height:1.8}.list{display:grid;gap:12px;margin-top:18px}.list-item{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid var(--line)}.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:16px}.status{font-size:14px;color:var(--muted);margin-top:10px}.large-number{font-size:50px;font-weight:900;color:var(--gold-dark);line-height:1}.photo-stage{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:stretch}.memory-info{display:flex;flex-direction:column;justify-content:center}.memory-info h2{font-family:"STKaiti","KaiTi";font-size:42px;margin:0 0 10px}.memory-info p{color:var(--muted);line-height:1.8}@media(max-width:800px){.topbar{padding:0 18px}.page-hero{padding:30px}.grid,.photo-stage{grid-template-columns:1fr}.shell{width:min(100% - 24px,1180px)}.page-hero{width:min(100% - 24px,1180px)}}
</style>
</head>
<body>
<header class="topbar"><a class="brand" href="index.html"><span class="brand-icon">🎓</span><span>毕业纪念相册</span></a><a class="back" href="index.html">返回首页</a></header>
<section class="page-hero"><span class="tag">惊喜瞬间</span><h1>随机回忆</h1><p>不用选择，交给随机按钮，让某一张照片主动来找你。</p></section>
<main class="shell">
<section class="photo-stage">
  <div class="panel"><img id="memoryImg" class="preview-img" alt="随机回忆"></div>
  <div class="panel memory-info"><h2 id="memoryTitle">随机回忆</h2><p id="memoryText">点击按钮，随机遇见一张毕业照片。</p><div class="toolbar"><button class="btn" id="randomBtn">开启随机回忆</button><a id="downloadLink" class="btn secondary" href="#" download>下载原图</a></div></div>
</section>
</main>
<script>
const photos=["DSC4817","DSC4831","DSC4835","DSC4841","DSC4844","DSC4852","DSC4853","DSC4854","DSC4857","DSC4858","DSC4861","DSC4862","DSC4863","DSC4864","DSC4866","DSC4868","DSC4869","DSC4872","DSC4873","DSC4874","DSC4880","DSC4892","DSC4893","DSC4897","DSC4899"];const img=document.getElementById('memoryImg'),title=document.getElementById('memoryTitle'),text=document.getElementById('memoryText'),download=document.getElementById('downloadLink');
function pick(){const p=photos[Math.floor(Math.random()*photos.length)];img.src=`photos_v2/large/${p}_large.webp`;download.href=`images/${p}.JPG`;download.setAttribute('download',p+'.JPG');title.textContent='随机回忆 · '+p;text.textContent='这张照片也许不是最特别的一张，但它刚好被此刻的你遇见。';}
document.getElementById('randomBtn').onclick=pick;pick();
</script>
</body>
</html>
